<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MASTER v20.4: CINEMATIC OPERATING SYSTEM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap");
    :root { color-scheme: dark; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Inter", sans-serif;
      background: #050505;
    }
    .hero-visual {
      position: absolute;
      top: 0;
      right: 0;
      width: 50vw;
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 28% 26%, rgba(78, 156, 255, 0.68), transparent 40%),
        linear-gradient(115deg, rgba(24, 82, 188, 0.3), transparent 68%),
        url("assets/banner final.png");
      background-position: center right;
      background-size: cover;
      opacity: 0.7;
      filter: saturate(0.95) contrast(1.16);
      pointer-events: none;
      z-index: 0;
    }
    .glass-card {
      background: linear-gradient(150deg, rgba(24, 24, 30, 0.74), rgba(16, 16, 20, 0.42));
      border: 1px solid rgba(124, 175, 255, 0.35);
      backdrop-filter: blur(10px);
      transition: transform 220ms ease, border-color 220ms ease, box-shadow 220ms ease;
    }
    .glass-card:hover {
      transform: translateY(-4px);
      border-color: rgba(161, 201, 255, 0.6);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.35);
    }
  </style>
</head>
<body class="text-zinc-100 antialiased">
  <div class="hero-visual"></div>

  <div class="relative z-10 min-h-screen">
    <header class="sticky top-0 border-b border-zinc-800/80 bg-black/70 backdrop-blur-xl">
      <nav class="mx-auto flex w-full max-w-7xl items-center justify-between px-6 py-4">
        <div class="flex items-center gap-3">
          <img src="assets/logo zemin.png" alt="MASTER v20.4 Seal" class="h-10 w-10 rounded-full border border-zinc-700 object-cover" />
          <span class="text-xs tracking-[0.28em] text-zinc-300 uppercase">Blueprint Studios</span>
        </div>
        <div class="hidden items-center gap-7 text-sm md:flex">
          <a href="#hero" data-i18n="nav.product" class="text-zinc-300 transition hover:text-white"></a>
          <a href="#about" data-i18n="nav.about" class="text-zinc-300 transition hover:text-white"></a>
          <a href="#pricing" data-i18n="nav.plans" class="rounded-full border border-blue-400/50 px-3 py-1 text-blue-200 transition hover:border-blue-300 hover:text-white"></a>
        </div>
        <button id="langToggle" class="rounded-full border border-zinc-600 px-3 py-1 text-xs tracking-wide transition hover:border-zinc-300">TR / EN</button>
      </nav>
    </header>

    <main>
      <section id="hero" class="mx-auto w-full max-w-7xl px-6 pb-20 pt-16 md:pt-24">
        <div class="max-w-4xl">
          <p data-i18n="hero.kicker" class="mb-4 text-xs tracking-[0.24em] text-zinc-400 uppercase"></p>
          <h1 data-i18n="hero.title" class="text-4xl font-extrabold leading-tight text-white md:text-6xl"></h1>
          <p data-i18n="hero.subtitle" class="mt-5 max-w-3xl text-lg leading-relaxed text-zinc-300"></p>
        </div>
      </section>

      <section id="about" class="mx-auto w-full max-w-7xl px-6 pb-14">
        <h2 data-i18n="about.title" class="mb-6 text-2xl font-semibold text-white md:text-3xl"></h2>
        <div class="grid gap-5 md:grid-cols-3">
          <article class="glass-card rounded-2xl p-6">
            <h3 class="text-lg text-white">BlueCore AI</h3>
            <p data-i18n="about.bluecore" class="mt-3 text-sm leading-relaxed text-zinc-300"></p>
          </article>
          <article class="glass-card rounded-2xl p-6">
            <h3 class="text-lg text-white">Metadata Management</h3>
            <p data-i18n="about.metadata" class="mt-3 text-sm leading-relaxed text-zinc-300"></p>
          </article>
          <article class="glass-card rounded-2xl p-6">
            <h3 class="text-lg text-white">Production OS</h3>
            <p data-i18n="about.production" class="mt-3 text-sm leading-relaxed text-zinc-300"></p>
          </article>
        </div>
      </section>

      <section id="pricing" class="mx-auto w-full max-w-7xl px-6 pb-16">
        <h2 data-i18n="pricing.title" class="mb-6 text-2xl font-semibold text-white md:text-3xl"></h2>
        <div class="grid gap-5 md:grid-cols-2 xl:grid-cols-4">
          <article class="glass-card rounded-2xl p-6">
            <p data-i18n="pricing.studentLabel" class="text-sm tracking-[0.2em] text-blue-300 uppercase"></p>
            <p class="mt-2 text-xl text-white">$9.99/mo</p>
            <p data-i18n="pricing.studentDesc" class="mt-3 text-sm leading-relaxed text-zinc-300"></p>
          </article>
          <article class="glass-card rounded-2xl p-6">
            <p data-i18n="pricing.standardLabel" class="text-sm tracking-[0.2em] text-blue-300 uppercase"></p>
            <p class="mt-2 text-xl text-white">$29/mo</p>
            <p data-i18n="pricing.standardDesc" class="mt-3 text-sm leading-relaxed text-zinc-300"></p>
          </article>
          <article class="glass-card rounded-2xl p-6">
            <p data-i18n="pricing.proLabel" class="text-sm tracking-[0.2em] text-blue-300 uppercase"></p>
            <p class="mt-2 text-xl text-white">$99/mo</p>
            <p data-i18n="pricing.proDesc" class="mt-3 text-sm leading-relaxed text-zinc-300"></p>
          </article>
          <article class="glass-card rounded-2xl p-6">
            <p data-i18n="pricing.businessLabel" class="text-sm tracking-[0.2em] text-blue-300 uppercase"></p>
            <p class="mt-2 text-xl text-white">Custom</p>
            <p data-i18n="pricing.businessDesc" class="mt-3 text-sm leading-relaxed text-zinc-300"></p>
          </article>
        </div>
      </section>
    </main>

    <footer class="mx-auto w-full max-w-7xl border-t border-zinc-800 px-6 py-8">
      <div class="flex items-center justify-between gap-4">
        <p data-i18n="footer.tagline" class="text-xs text-zinc-400"></p>
        <img src="assets/logo zemin.png" alt="MASTER v20.4 Signature Seal" class="h-10 w-10 rounded-full border border-zinc-700 object-cover" />
      </div>
    </footer>
  </div>

  <script>
    const i18n = {
      tr: {
        "nav.product": "MASTER v20.4",
        "nav.about": "Bu Nedir?",
        "nav.plans": "Planlar",
        "hero.kicker": "Professional Film Production OS",
        "hero.title": "MASTER v20.4: CINEMATIC OPERATING SYSTEM",
        "hero.subtitle": "Sinematik Sanatın üretim disiplinini, teknik kesinlik ve hızla birleştiren prestijli prodüksiyon işletim sistemi.",
        "about.title": "Bu Nedir?",
        "about.bluecore": "Fiziksel dünyadaki her objeyi her karede mühürler.",
        "about.metadata": "ARRI Alexa 35 verilerini anlık işler.",
        "about.production": "24 yıllık tecrübeyle tüm süreci yönetir.",
        "pricing.title": "Planlar",
        "pricing.studentLabel": "Öğrenci",
        "pricing.studentDesc": "1080p Export, Core v20.4 Access.",
        "pricing.standardLabel": "Standart",
        "pricing.standardDesc": "4K Workflow, BlueCore AI Integration.",
        "pricing.proLabel": "Pro",
        "pricing.proDesc": "8K Render, Arri LogC4 Workflow, VIP Support.",
        "pricing.businessLabel": "Business",
        "pricing.businessDesc": "Stüdyo Lisansları.",
        "footer.tagline": "Blueprint Studios | MASTER v20.4 Signature Seal"
      },
      en: {
        "nav.product": "MASTER v20.4",
        "nav.about": "What Is It?",
        "nav.plans": "Plans",
        "hero.kicker": "Professional Film Production OS",
        "hero.title": "MASTER v20.4: CINEMATIC OPERATING SYSTEM",
        "hero.subtitle": "A prestigious production operating system that unifies the discipline of cinematic art with technical precision and speed.",
        "about.title": "What Is It?",
        "about.bluecore": "Seals every physical object consistently across every frame.",
        "about.metadata": "Processes ARRI Alexa 35 metadata in real time.",
        "about.production": "Manages the full pipeline with 24 years of expertise.",
        "pricing.title": "Pricing",
        "pricing.studentLabel": "Student",
        "pricing.studentDesc": "1080p Export, Core v20.4 Access.",
        "pricing.standardLabel": "Standard",
        "pricing.standardDesc": "4K Workflow, BlueCore AI Integration.",
        "pricing.proLabel": "Pro",
        "pricing.proDesc": "8K Render, Arri LogC4 Workflow, VIP Support.",
        "pricing.businessLabel": "Business",
        "pricing.businessDesc": "Studio Licenses.",
        "footer.tagline": "Blueprint Studios | MASTER v20.4 Signature Seal"
      }
    };

    function applyLanguage(lang) {
      document.documentElement.lang = lang;
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        const key = node.dataset.i18n;
        const value = i18n[lang][key];
        if (value) node.textContent = value;
      });
    }

    const toggle = document.getElementById("langToggle");
    let lang = "tr";
    applyLanguage(lang);
    toggle.addEventListener("click", () => {
      lang = lang === "tr" ? "en" : "tr";
      applyLanguage(lang);
    });
  </script>
</body>
</html>
